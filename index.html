<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHunt - Recherche GitHub</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header>
            <h1>GitHunt</h1>
            <p>Recherche de talents développeurs</p>

            <div class="tabs">
                <button id="tab-search" class="tab active">Rechercher</button>
                <button id="tab-bookmarks" class="tab">
                    Favoris <span id="bookmark-count" class="count">0</span>
                </button>
            </div>
        </header>

        <!-- Section Recherche -->
        <section id="search-section" class="section active">
            <div class="search-bar">
                <input type="text" id="username-input" placeholder="Nom d'utilisateur GitHub (ex: octocat)"
                    autocomplete="off" />
                <button id="search-btn">Rechercher</button>
            </div>

            <div id="welcome" class="welcome">
                <div class="illustration">🔍</div>
                <h2>Recherchez un développeur GitHub</h2>
                <p>Entrez un nom d'utilisateur pour voir son profil et ses statistiques.</p>
            </div>

            <!-- États dynamiques -->
            <div id="loading" class="hidden">
                <div class="loader"></div>
                <p>Chargement du profil...</p>
            </div>

            <div id="error" class="hidden">
                <div class="error-icon">⚠️</div>
                <h3 id="error-title"></h3>
                <p id="error-message"></p>
                <button id="retry-btn">Réessayer</button>
            </div>

            <div id="profile" class="profile-card hidden">
                <!-- Rempli dynamiquement par JS -->
            </div>
        </section>

        <!-- Section Favoris -->
        <section id="bookmarks-section" class="section hidden">
            <h2>Mes développeurs favoris <span id="total-bookmarks">0</span></h2>
            <div id="bookmarks-list" class="bookmarks-grid">
                <!-- Rempli dynamiquement -->
            </div>
</body>

</html>
