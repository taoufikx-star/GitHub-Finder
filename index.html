Hunt<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHunt — Recherche de Profils GitHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">⌬ Git<span>Hunt</span></div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="btn-show-bookmarks">
        ★ Favoris <span id="header-badge" class="badge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Barre de recherche -->
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">@</span>
        <input type="text" id="search-input" placeholder="Entrez un pseudo GitHub..." autocomplete="off" />
      </div>
      <button class="btn btn-primary" id="btn-search">CHERCHER</button>
    </div>

    <!-- Vue : Accueil -->
    <div id="view-welcome" class="view active">
      <span class="welcome-icon">⌬</span>
      <h1>Trouvez les meilleurs<br /><span class="hl">développeurs GitHub</span></h1>
      <p>Recherchez un profil, explorez ses stats et sauvegardez vos candidats favoris.</p>
    </div>

    <!-- Vue : Chargement -->
    <div id="view-loading" class="view">
      <div class="loader"></div>
      <span class="loader-text">RECHERCHE EN COURS...</span>
    </div>

    <!-- Vue : Erreur -->
    <div id="view-error" class="view">
      <div class="error-box">
        <span class="error-icon">✕</span>
        <span class="error-msg" id="error-message">Utilisateur non trouvé.</span>
      </div>
    </div>

    <!-- Vue : Résultats profil -->
    <div id="view-results" class="view">
      <div class="profile-card" id="profile-card"></div>
       <div id="reposList"></div>
    </div>

    <!-- Vue : Favoris -->
    <div id="view-bookmarks" class="view">
      <div class="section-header">
        <span class="section-title">
          ★ Favoris
          <span class="badge" id="bookmarks-count">0</span>
        </span>
        <button class="btn btn-ghost" id="btn-back">← Retour</button>
      </div>
      <div class="bookmarks-list" id="bookmarks-list"></div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
